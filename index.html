<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Bash | The Den</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1 class="glitch">THE LEGENDS ASSEMBLY</h1>
            <p class="subtitle">CELEBRATING DIVYANSH, BHAVESH & HARSH</p>
        </header>

        <div class="profile-grid">
            <div class="card">
                <div class="img-container">
                    <img src="images/divyansh.jpg" alt="Divyansh">
                </div>
                <h3>DIVYANSH</h3>
            </div>
            <div class="card">
                <div class="img-container">
                    <img src="images/bhavesh.jpg" alt="Bhavesh">
                </div>
                <h3>BHAVESH</h3>
            </div>
            <div class="card">
                <div class="img-container">
                    <img src="images/harsh.jpg" alt="Harsh">
                </div>
                <h3>HARSH</h3>
            </div>
        </div>

        <div class="info-section">
            <div class="details">
                <p><strong>DATE:</strong> AS PER PLAN</p>
                <p><strong>TIME:</strong> 8:00 PM ONWARDS</p>
            </div>
            
            <a href="https://maps.app.goo.gl/E9334YktNyGq6q5U7" class="btn" target="_blank">LOCATE THE DEN</a>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
