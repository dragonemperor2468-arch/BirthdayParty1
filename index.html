<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Unholy Trinity | Divyansh • Bhavesh • Harsh</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="glitch-wrapper">
           <h1 class="glitch" data-text="THE UNHOLY TRINITY">THE UNHOLY TRINITY</h1>
        </div>
        
        <p class="sub-text">ONE NIGHT. THREE LEGENDS. MAXIMUM CHAOS.</p>
        
        <div class="friends-container">
            <div class="friend-card">
                <div class="photo-frame">
                    <img src="images/divyansh.jpg" alt="Divyansh">
                </div>
                <h2 class="name">DIVYANSH</h2>
            </div>

            <div class="friend-card">
                <div class="photo-frame">
                    <img src="images/bhavesh.jpg" alt="Bhavesh">
                </div>
                <h2 class="name">BHAVESH</h2>
            </div>

            <div class="friend-card">
                <div class="photo-frame">
                    <img src="images/harsh.jpg" alt="Harsh">
                </div>
                <h2 class="name">HARSH</h2>
            </div>
        </div>

        <div class="party-info">
            <p><strong>WHEN:</strong> 20th OCTOBER | 8:00 PM onwards</p>
            <p><strong>WHERE:</strong> Firangish Cafe & Courtyard</p>
        </div>

        <button class="map-btn" onclick="openLocation()">LOCATE THE DEN</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
